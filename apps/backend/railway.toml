[build]
builder = "RAILPACK"
buildCommand = "npm install && npm run build --workspace=@mandarin/backend && npx prisma generate --schema=apps/backend/prisma/schema.prisma"

[deploy]
startCommand = "npm run start --workspace=@mandarin/backend"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"